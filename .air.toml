## If you're on Windows, use the Windows-specific config: `air -c .air.windows.toml`
## This file continues to work on Linux and macOS.
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "tmp/main"
  cmd = "rm ./tmp/main; go build -o ./tmp/main ."
  delay = 10000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "DB", "Images", "log", "logs"]
  exclude_file = ["version.go"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "go generate ./... && SEPG_SESSION_SECRET='ver_vewy_secwet' ./tmp/main -increment-etag && SEPG_SESSION_SECURE=false SEPG_SESSION_SECRET='your-very-strong-and-unique-secret-key-v2' ./tmp/main -debug-delay-ms=0 -port=8083"
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html", "html.tmpl"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = false

[proxy]
  app_port = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
