# Windows-specific configuration for air (live-reload tool)
# Use this config on Windows by running:
#   air -c .air.windows.toml
# It mirrors .air.toml but uses a Windows executable name and path for the built binary.
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  # On Windows, produce an .exe in the tmp directory.
  bin = ".\\tmp\\main.exe"
  # Use Windows-style path for the output binary and the build command.
  cmd = "go build -o .\\tmp\\main.exe ."
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "DB", "Images", "log", "logs"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "cmd /c \"set SEPG_SESSION_SECRET=your-very-strong-and-unique-secret-key && .\\tmp\\main.exe\""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = false

[proxy]
  app_port = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
